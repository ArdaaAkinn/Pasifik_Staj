<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Socket Deneme</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">
  <div class="container mx-auto p-4">
    <h1 class="text-2xl font-bold mb-4">Socket Deneme</h1>
    <div id="messages" class="mb-4"></div>
    <input id="messageInput" type="text" placeholder="Type a message..." class="border p-2 w-full mb-2" />
    <button id="sendButton" class="bg-blue-500 text-white p-2 rounded">Send</button>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script>
    const socket = io("http://localhost:3001");

    const messagesDiv = document.getElementById('messages');
    const messageInput = document.getElementById('messageInput');
    const sendButton = document.getElementById('sendButton');

    sendButton.addEventListener('click', () => {
      const message = messageInput.value;
      if (message) {
        socket.emit('message', message);
        messageInput.value = '';
      }
    });

    socket.on('message', (msg) => {
      console.log('Received message:', msg);
      const messageElement = document.createElement('div');
      messageElement.textContent = msg;
      messagesDiv.appendChild(messageElement);
    });
  </script>
